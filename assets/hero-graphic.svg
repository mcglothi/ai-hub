<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Hub Hero Graphic</title>
  <desc id="desc">Modern, futuristic hero graphic for AI Hub featuring local LLM control plane features.</desc>
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4EDCFF"/>
      <stop offset="100%" stop-color="#41E6B0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B223D"/>
      <stop offset="100%" stop-color="#07182B"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EDCFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#41E6B0" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- Subtle Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#173A61" stroke-width="1" stroke-opacity="0.3"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Background Elements (Abstract Nodes) -->
  <g opacity="0.1">
    <circle cx="1000" cy="100" r="150" fill="none" stroke="#4EDCFF" stroke-width="1"/>
    <circle cx="1000" cy="100" r="100" fill="none" stroke="#41E6B0" stroke-width="1"/>
    <line x1="850" y1="100" x2="1150" y2="100" stroke="#4EDCFF" stroke-width="1"/>
    <line x1="1000" y1="-50" x2="1000" y2="250" stroke="#41E6B0" stroke-width="1"/>
  </g>

  <!-- Central Visual Element: The Hub Core -->
  <g transform="translate(150, 200)">
    <!-- Outer Ring -->
    <circle r="120" fill="none" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="20 10" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner Ring -->
    <circle r="90" fill="none" stroke="#4EDCFF" stroke-width="4" stroke-opacity="0.4"/>
    <!-- Central Node -->
    <circle r="40" fill="#0A2644" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#softGlow)"/>
    <path d="M-15 -15 L15 15 M-15 15 L15 -15" stroke="#EAF4FF" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Orbiting Nodes -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="15s" repeatCount="indefinite"/>
      <circle cx="120" cy="0" r="12" fill="#4EDCFF" filter="url(#softGlow)"/>
      <circle cx="-120" cy="0" r="12" fill="#41E6B0" filter="url(#softGlow)"/>
      <circle cx="0" cy="120" r="8" fill="#4EDCFF" opacity="0.6"/>
      <circle cx="0" cy="-120" r="8" fill="#41E6B0" opacity="0.6"/>
    </g>
  </g>

  <!-- Text Content -->
  <g transform="translate(380, 160)">
    <!-- Title -->
    <text font-family="Sora, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="84" fill="#EAF4FF" letter-spacing="-2">
      AI HUB
    </text>
    
    <!-- Slogan -->
    <text y="60" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="28" fill="#4EDCFF" letter-spacing="1" opacity="0.9">
      LOCAL LLM CONTROL PLANE
    </text>
    
    <!-- Separator Line -->
    <rect y="90" width="600" height="2" fill="url(#nodeGrad)"/>
    
    <!-- Feature List -->
    <g transform="translate(0, 135)">
      <!-- Memory -->
      <g>
        <rect width="180" height="40" rx="20" fill="#173A61" fill-opacity="0.5" stroke="#4EDCFF" stroke-width="1"/>
        <text x="90" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="16" fill="#EAF4FF">Memory Explorer</text>
      </g>
      <!-- Stewardship -->
      <g transform="translate(200, 0)">
        <rect width="190" height="40" rx="20" fill="#173A61" fill-opacity="0.5" stroke="#41E6B0" stroke-width="1"/>
        <text x="95" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="16" fill="#EAF4FF">Model Stewardship</text>
      </g>
      <!-- Sessions -->
      <g transform="translate(410, 0)">
        <rect width="170" height="40" rx="20" fill="#173A61" fill-opacity="0.5" stroke="#4EDCFF" stroke-width="1"/>
        <text x="85" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="16" fill="#EAF4FF">Agent Sessions</text>
      </g>
    </g>
  </g>
  
  <!-- Corner Accents -->
  <path d="M 0 50 L 0 0 L 50 0" fill="none" stroke="#4EDCFF" stroke-width="4" stroke-opacity="0.5" transform="translate(20, 20)"/>
  <path d="M 0 50 L 0 0 L 50 0" fill="none" stroke="#41E6B0" stroke-width="4" stroke-opacity="0.5" transform="translate(1180, 380) rotate(180)"/>

</svg>
