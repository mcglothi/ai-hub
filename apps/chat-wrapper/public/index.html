<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Turing Desktop v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
  <style>
    :root {
      --bg-0: #071221;
      --bg-1: #0f1f34;
      --surface: rgba(10, 18, 30, 0.85);
      --surface-2: rgba(16, 28, 43, 0.95);
      --border: rgba(130, 175, 220, 0.2);
      --accent: #53d8b5;
      --accent-2: #57a6ff;
      --text: #eef5ff;
      --text-dim: #9cb0c8;
      --radius: 12px;
      --header-h: 60px;
      --sidebar-w: 260px;
      --cmd-h: 70px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Sora', sans-serif; background: var(--bg-0); color: var(--text); overflow: hidden; }

    #app {
      display: flex;
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
      padding:
        var(--safe-top)
        var(--safe-right)
        var(--safe-bottom)
        var(--safe-left);
    }

    aside#sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100;
    }
    .sidebar-header { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .workspace-list { flex: 1; overflow-y: auto; padding: 10px; }
    .ws-item { 
      padding: 10px 12px; border-radius: var(--radius); cursor: pointer; margin-bottom: 4px;
      transition: background 0.2s; border: 1px solid transparent; overflow: hidden;
    }
    .ws-item:hover { background: rgba(255,255,255,0.05); }
    .ws-item.active { background: rgba(87, 166, 255, 0.15); border-color: var(--accent-2); }
    .ws-item .name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .ws-item .path { font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

    main#content { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }

    header#main-header {
      height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 15px; gap: 10px; flex-shrink: 0;
      min-width: 0;
    }

    .facet-tabs {
      display: flex; background: rgba(0,0,0,0.2); padding: 3px; border-radius: 10px; flex-shrink: 0;
      min-width: 0;
    }
    .facet-btn { 
      padding: 6px 12px; border-radius: 8px; border: 0; background: transparent; 
      color: var(--text-dim); font-weight: 600; font-size: 0.8rem; cursor: pointer;
    }
    .facet-btn.active { background: var(--accent-2); color: #000; }

    .session-tabs { display: flex; gap: 6px; overflow-x: auto; flex: 1; padding: 0 5px; scrollbar-width: none; }
    .session-tabs::-webkit-scrollbar { display: none; }
    .session-tab {
      padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.05);
      font-size: 0.75rem; white-space: nowrap; cursor: pointer; border: 1px solid var(--border);
      max-width: 150px; text-overflow: ellipsis; overflow: hidden;
    }
    .session-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(83, 216, 181, 0.1); }

    #facet-container { flex: 1; position: relative; overflow: hidden; }
    .facet-view { position: absolute; inset: 0; display: none; flex-direction: column; }
    .facet-view.active { display: flex; }

    #shell-view { background: #000; padding: 5px; }
    .terminal-container { flex: 1; width: 100%; height: 100%; }

    #assist-view { background: var(--bg-1); overflow-y: auto; padding: 15px; gap: 12px; scroll-behavior: smooth; }
    .msg { max-width: 90%; padding: 10px 14px; border-radius: var(--radius); line-height: 1.4; font-size: 0.9rem; margin-bottom: 10px; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: var(--accent-2); color: #000; border-bottom-right-radius: 2px; }
    .msg.assistant { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
    .msg pre { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; overflow-x: auto; margin: 8px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .msg code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }

    #edit-view iframe { width: 100%; height: 100%; border: 0; }

    #memory-view { background: var(--bg-1); overflow-y: auto; padding: 12px; }
    .memory-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 10px; }
    .memory-card {
      grid-column: span 6;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      min-height: 120px;
    }
    .memory-card.full { grid-column: span 12; }
    .memory-card.proposals { grid-column: span 8; }
    .memory-card.graph { grid-column: span 8; }
    .memory-title { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.04em; }
    .memory-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .memory-stat { border: 1px solid var(--border); border-radius: 10px; padding: 8px; background: rgba(0,0,0,0.2); }
    .memory-stat .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
    .memory-stat .value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; margin-top: 4px; color: #cde8ff; }
    .memory-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .memory-input {
      flex: 1; min-width: 160px; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.25); color: var(--text); font-family: inherit; font-size: 0.85rem;
    }
    .memory-btn {
      border: 1px solid var(--border); border-radius: 9px; background: rgba(0,0,0,0.2);
      color: var(--text); font-size: 0.8rem; font-weight: 600; padding: 7px 11px; cursor: pointer;
    }
    .memory-list { display: grid; gap: 8px; max-height: 280px; overflow-y: auto; }
    .memory-item { border: 1px solid var(--border); border-radius: 9px; padding: 7px 9px; background: rgba(0,0,0,0.18); font-size: 0.78rem; line-height: 1.35; }
    .memory-item .meta { color: var(--text-dim); font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
    .memory-item.proposal-pill { cursor: pointer; }
    .memory-item.proposal-pill.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(83,216,181,0.25) inset; }
    .memory-proposals-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .memory-proposal-detail { border: 1px solid var(--border); border-radius: 9px; padding: 8px; background: rgba(0,0,0,0.18); display: grid; gap: 8px; align-content: start; }
    .memory-proposal-detail .detail-title { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
    .memory-textarea {
      width: 100%; min-height: 70px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.25); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; padding: 8px;
      resize: vertical;
    }
    .memory-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .memory-helper {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px;
      background: rgba(0,0,0,0.16);
      display: grid;
      gap: 6px;
    }
    .memory-chip {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: #d4e8ff;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .memory-chip.recommend-approve { border-color: rgba(83,216,181,0.65); color: #53d8b5; }
    .memory-chip.recommend-reject { border-color: rgba(255,130,130,0.6); color: #ff9a9a; }
    #memory-graph {
      width: 100%; height: 300px; border: 1px solid var(--border); border-radius: 10px;
      background: radial-gradient(circle at top, #122138, #08101c);
    }
    #memory-status { white-space: pre-line; font-size: 0.75rem; color: var(--text-dim); }

    #command-bar {
      height: var(--cmd-h); background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 15px; gap: 15px; flex-shrink: 0;
      min-width: 0;
    }
    #cmd-input {
      flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 15px; color: var(--text); font-family: inherit; font-size: 0.95rem; min-width: 100px; box-sizing: border-box;
    }
    .cmd-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 0; background: var(--surface-2);
      color: var(--text); cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
    }
    .cmd-btn.active { color: var(--accent); box-shadow: 0 0 10px var(--accent); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; place-items: center; z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: grid; }
    .modal {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px;
      width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; gap: 15px;
    }
    .modal h2 { font-size: 1.2rem; font-weight: 700; }
    .modal input, .modal select {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
      background: #0a121e; color: #fff; font-family: inherit; font-size: 0.95rem; outline: none; appearance: none;
    }
    .modal select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; }
    .modal option { background: #0a121e; color: #fff; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .btn { padding: 8px 16px; border-radius: 8px; border: 0; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .btn-primary { background: var(--accent-2); color: #000; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-dim); }

    @media (max-width: 768px) {
      aside#sidebar { position: absolute; transform: translateX(-100%); width: 85%; max-width: 300px; }
      aside#sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
      .sidebar-toggle { display: flex !important; }
      .session-tabs { display: none; }
      .memory-card { grid-column: span 12; }
      .memory-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .memory-proposals-layout { grid-template-columns: 1fr; }
      header#main-header {
        height: auto;
        min-height: var(--header-h);
        padding: 10px 12px;
        flex-wrap: wrap;
        align-content: flex-start;
      }
      .facet-tabs {
        order: 2;
        width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .facet-tabs::-webkit-scrollbar { display: none; }
      .facet-btn { flex: 0 0 auto; }
      #add-session-btn {
        margin-left: auto;
        flex-shrink: 0;
      }
      #assist-view, #memory-view { padding: 12px; }
      .msg {
        max-width: 100%;
        font-size: 0.88rem;
      }
      #command-bar {
        height: auto;
        min-height: var(--cmd-h);
        padding: 10px 12px;
        gap: 10px;
        flex-wrap: wrap;
      }
      #cmd-input {
        order: 3;
        width: 100%;
        min-width: 0;
      }
    }

    @media (max-width: 480px) {
      :root {
        --header-h: 56px;
        --cmd-h: 64px;
      }
      .sidebar-header { padding: 14px 16px; }
      .workspace-list { padding: 8px; }
      .facet-btn {
        padding: 8px 10px;
        font-size: 0.76rem;
      }
      .cmd-btn {
        width: 42px;
        height: 42px;
      }
      #cmd-input {
        padding: 12px 14px;
        font-size: 16px;
      }
      .modal-overlay { padding: 12px; }
      .modal {
        padding: 18px;
        max-height: calc(100svh - 24px);
        overflow-y: auto;
      }
    }
    .sidebar-toggle { display: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span>Workspaces</span>
        <button id="add-ws-btn" title="New Workspace" style="background: transparent; border: 0; color: var(--accent); font-size: 1.5rem; cursor: pointer;">+</button>
      </div>
      <div id="workspace-list" class="workspace-list"></div>
    </aside>

    <main id="content">
      <header id="main-header">
        <button id="menu-btn" class="cmd-btn sidebar-toggle">☰</button>
        <div class="facet-tabs">
          <button class="facet-btn active" data-facet="assist">Assist</button>
          <button class="facet-btn" data-facet="shell">Shell</button>
          <button class="facet-btn" data-facet="edit">Edit</button>
          <button class="facet-btn" data-facet="memory">Memory</button>
        </div>
        <div id="session-tabs" class="session-tabs"></div>
        <button id="add-session-btn" class="facet-btn" title="New Session">+</button>
      </header>

      <div id="facet-container">
        <div id="assist-view" class="facet-view active">
          <div id="chat-history" style="display: flex; flex-direction: column;"></div>
        </div>
        <div id="shell-view" class="facet-view">
          <div id="terminal" class="terminal-container"></div>
        </div>
        <div id="edit-view" class="facet-view">
          <iframe id="editor-frame" src=""></iframe>
        </div>
        <div id="memory-view" class="facet-view">
          <div class="memory-grid">
            <div class="memory-card full">
              <div class="memory-title">Memory Overview</div>
              <div class="memory-stats">
                <div class="memory-stat"><div class="label">Health</div><div id="mem-health" class="value">-</div></div>
                <div class="memory-stat"><div class="label">Events</div><div id="mem-events" class="value">-</div></div>
                <div class="memory-stat"><div class="label">New Proposals</div><div id="mem-proposals-new" class="value">-</div></div>
                <div class="memory-stat"><div class="label">Machines</div><div id="mem-machines" class="value">-</div></div>
              </div>
            </div>
            <div class="memory-card">
              <div class="memory-title">Harvester</div>
              <div class="memory-controls">
                <input id="mem-max-events" class="memory-input" type="number" min="1" max="2000" value="250">
                <input id="mem-state-name" class="memory-input" type="text" value="default">
              </div>
              <div class="memory-controls">
                <button id="mem-harvest-btn" class="memory-btn">Run Harvest</button>
                <button id="mem-refresh-btn" class="memory-btn">Refresh</button>
              </div>
              <div id="memory-status">Idle.</div>
            </div>
            <div class="memory-card">
              <div class="memory-title">Search</div>
              <div class="memory-controls">
                <input id="mem-query" class="memory-input" type="search" placeholder="Search memory + AIKB...">
                <button id="mem-search-btn" class="memory-btn">Search</button>
              </div>
              <div id="mem-search-results" class="memory-list"></div>
            </div>
            <div class="memory-card proposals">
              <div class="memory-title">Proposals</div>
              <div class="memory-controls">
                <select id="mem-proposal-status" class="memory-input">
                  <option value="new">New</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                  <option value="applied">Applied</option>
                  <option value="">All</option>
                </select>
                <button id="mem-proposals-refresh-btn" class="memory-btn">Reload</button>
              </div>
              <div class="memory-proposals-layout">
                <div id="mem-proposals" class="memory-list"></div>
                <div id="mem-proposal-detail" class="memory-proposal-detail">
                  <div class="meta">Select a proposal to review.</div>
                </div>
              </div>
            </div>
            <div class="memory-card graph">
              <div class="memory-title">Graphical Search</div>
              <svg id="memory-graph" viewBox="0 0 800 300" preserveAspectRatio="xMidYMid meet"></svg>
            </div>
          </div>
        </div>
      </div>

      <footer id="command-bar">
        <button id="mic-btn" class="cmd-btn">\ud83c\udf99\ufe0f</button>
        <input type="text" id="cmd-input" placeholder="Ask or type command..." autocomplete="off">
        <button id="send-btn" class="cmd-btn">➤</button>
      </footer>
    </main>
  </div>

  <div id="ws-modal" class="modal-overlay">
    <div class="modal">
      <h2>New Workspace</h2>
      <input type="text" id="ws-name" placeholder="Project Name (e.g. My App)">
      <input type="text" id="ws-path" placeholder="Root Path (e.g. /home/mcglothi/Code/my-app)">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('ws-modal')">Cancel</button>
        <button class="btn btn-primary" id="ws-create-btn">Create Workspace</button>
      </div>
    </div>
  </div>

  <div id="session-modal" class="modal-overlay">
    <div class="modal">
      <h2>New Session</h2>
      <label style="font-size: 0.8rem; color: var(--text-dim);">Select Tool</label>
      <select id="session-provider">
        <option value="claude">Claude Code</option>
        <option value="gemini">Gemini Code Assist</option>
        <option value="codex">Codex CLI</option>
        <option value="zsh">Zsh Shell</option>
      </select>
      <input type="text" id="session-title" placeholder="Session Title (optional)">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('session-modal')">Cancel</button>
        <button class="btn btn-primary" id="session-create-btn">Launch Tool</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script>
    const state = {
      workspaces: [],
      activeWorkspace: null,
      sessions: [],
      activeSession: null,
      facet: 'assist',
      term: null,
      fit: null,
      socket: null,
      memoryLoaded: false,
      memoryLastSearch: null,
      memoryProposalsCache: [],
      memorySelectedProposalId: null
    };

    const api = async (path, opts = {}) => {
      console.log('API Call:', path, opts.method || 'GET');
      try {
        const res = await fetch("/api/v2" + path, opts);
        if (!res.ok) {
          const body = await res.text();
          console.error('API Error:', res.status, body);
          throw new Error(`API ${res.status}: ${body}`);
        }
        return res.json();
      } catch (err) {
        console.error('Fetch Failed:', err);
        throw err;
      }
    };

    const memoryApi = async (path, opts = {}) => {
      const res = await fetch(path, opts);
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Memory API ${res.status}: ${body.slice(0, 400)}`);
      }
      return res.json();
    };

    const el = {
      wsList: document.getElementById('workspace-list'),
      sessionTabs: document.getElementById('session-tabs'),
      chatHistory: document.getElementById('chat-history'),
      terminal: document.getElementById('terminal'),
      editorFrame: document.getElementById('editor-frame'),
      cmdInput: document.getElementById('cmd-input'),
      micBtn: document.getElementById('mic-btn'),
      sendBtn: document.getElementById('send-btn'),
      facetBtns: document.querySelectorAll('.facet-btn[data-facet]'),
      views: document.querySelectorAll('.facet-view'),
      sidebar: document.getElementById('sidebar'),
      menuBtn: document.getElementById('menu-btn'),
      addWsBtn: document.getElementById('add-ws-btn'),
      addSessionBtn: document.getElementById('add-session-btn'),
      sessionCreateBtn: document.getElementById('session-create-btn'),
      memHealth: document.getElementById('mem-health'),
      memEvents: document.getElementById('mem-events'),
      memProposalsNew: document.getElementById('mem-proposals-new'),
      memMachines: document.getElementById('mem-machines'),
      memStatus: document.getElementById('memory-status'),
      memProposals: document.getElementById('mem-proposals'),
      memProposalStatus: document.getElementById('mem-proposal-status'),
      memProposalsRefreshBtn: document.getElementById('mem-proposals-refresh-btn'),
      memProposalDetail: document.getElementById('mem-proposal-detail'),
      memSearchResults: document.getElementById('mem-search-results'),
      memGraph: document.getElementById('memory-graph'),
      memQuery: document.getElementById('mem-query'),
      memMaxEvents: document.getElementById('mem-max-events'),
      memStateName: document.getElementById('mem-state-name'),
      memHarvestBtn: document.getElementById('mem-harvest-btn'),
      memRefreshBtn: document.getElementById('mem-refresh-btn'),
      memSearchBtn: document.getElementById('mem-search-btn')
    };

    const closeModal = (id) => document.getElementById(id).classList.remove('active');
    const openModal = (id) => document.getElementById(id).classList.add('active');
    const isMobileViewport = () => window.matchMedia('(max-width: 768px)').matches;

    const initTerm = () => {
      if (state.term) return;
      state.term = new Terminal({
        fontFamily: 'JetBrains Mono, monospace',
        fontSize: 13,
        theme: { background: '#000' },
        cursorBlink: true
      });
      state.fit = new FitAddon.FitAddon();
      state.term.loadAddon(state.fit);
      state.term.open(el.terminal);
      state.term.onData(data => { if (state.socket?.readyState === WebSocket.OPEN) state.socket.send(data); });
    };

    const connectWS = (sessionId) => {
      console.log('Connecting WebSocket for session:', sessionId);
      if (state.socket) state.socket.close();
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      state.socket = new WebSocket(`${protocol}://${location.host}/ws/v2/terminal/${sessionId}`);
      
      state.socket.onopen = () => {
        console.log('WebSocket Connected');
        const dims = state.fit.proposeDimensions();
        state.socket.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
      };
      
      state.socket.onmessage = (ev) => {
        state.term.write(ev.data);
      };
      
      state.socket.onerror = (err) => console.error('WebSocket Error:', err);
      state.socket.onclose = () => console.log('WebSocket Closed');
    };

    const loadWorkspaces = async () => {
      state.workspaces = await api('/workspaces');
      renderWorkspaces();
      if (state.workspaces.length && !state.activeWorkspace) selectWorkspace(state.workspaces[0]);
    };

    const renderWorkspaces = () => {
      el.wsList.innerHTML = state.workspaces.map(ws => `
        <div class="ws-item ${state.activeWorkspace?.workspace_id === ws.workspace_id ? 'active' : ''}" onclick="selectWorkspaceById('${ws.workspace_id}')">
          <div class="name">${ws.name}</div>
          <div class="path">${ws.root_dir.replace("/home/mcglothi/Code", "~")}</div>
        </div>
      `).join('');
    };

    window.selectWorkspaceById = (id) => selectWorkspace(state.workspaces.find(w => w.workspace_id === id));

    const selectWorkspace = async (ws) => {
      console.log('Selecting Workspace:', ws.name);
      state.activeWorkspace = ws;
      renderWorkspaces();
      try {
        state.sessions = await api(`/sessions/v2?workspace_id=${ws.workspace_id}`);
        renderSessions();
        if (state.sessions.length) selectSession(state.sessions[0]);
        else createInitialSessions(ws);
      } catch (err) {
        console.error('Failed to load sessions:', err);
      }
      el.editorFrame.src = "https://code.home.timmcg.net/?folder=" + encodeURIComponent(ws.root_dir.replace("/home/mcglothi/Code", "/home/coder/project"));
      el.sidebar.classList.remove('open');
    };

    const createInitialSessions = async (ws) => {
      console.log('Creating initial sessions...');
      try {
        const shell = await api('/sessions/v2', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ workspace_id: ws.workspace_id, provider: 'zsh', title: 'Shell' })
        });
        const claude = await api('/sessions/v2', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ workspace_id: ws.workspace_id, provider: 'claude', title: 'Claude' })
        });
        state.sessions = [shell, claude];
        renderSessions();
        selectSession(shell);
      } catch (err) {
        console.error('Failed to create initial sessions:', err);
      }
    };

    const renderSessions = () => {
      el.sessionTabs.innerHTML = state.sessions.map(s => `
        <div class="session-tab ${state.activeSession?.session_id === s.session_id ? 'active' : ''}" onclick="selectSessionById('${s.session_id}')">
          ${s.title}
        </div>
      `).join('');
    };

    window.selectSessionById = (id) => selectSession(state.sessions.find(s => s.session_id === id));

    const selectSession = (s) => {
      console.log('Selecting Session:', s.title);
      state.activeSession = s;
      renderSessions();
      initTerm();
      connectWS(s.session_id);
      loadHistory(s.session_id);
      el.cmdInput.placeholder = `Message ${s.provider}...`;
      if (isMobileViewport()) {
        el.sidebar.classList.remove('open');
      }
    };

    const loadHistory = async (id) => {
      try {
        const data = await api(`/history/${id}`);
        el.chatHistory.innerHTML = data.events.slice(-40).map(ev => {
          if (ev.event === 'input') return `<div class="msg user">${ev.data}</div>`;
          if (ev.event === 'output') {
             const clean = ev.data.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '');
             if (!clean.trim()) return '';
             return `<div class="msg assistant">${marked.parse(clean)}</div>`;
          }
          return '';
        }).join('');
        el.chatHistory.scrollTop = el.chatHistory.scrollHeight;
      } catch (err) {
        console.warn('History load failed:', err);
      }
    };

    const fmtTs = (ts) => {
      if (!ts) return '-';
      return new Date(Number(ts) * 1000).toLocaleString();
    };

    const renderMemoryGraph = (search) => {
      const q = search?.query || (state.memoryLastSearch ? state.memoryLastSearch.query : 'memory');
      const aikbHits = (search?.aikb || []).slice(0, 16);
      const eventHits = (search?.events || []).slice(0, 10);
      const ns = 'http://www.w3.org/2000/svg';
      el.memGraph.innerHTML = '';

      const nodes = [{ id: 'q', label: q, x: 400, y: 150, kind: 'q' }];
      const edges = [];
      const radius = 110;
      let nodeCount = 0;

      for (let i = 0; i < aikbHits.length; i++) {
        const angle = (Math.PI * 2 * i) / Math.max(1, aikbHits.length);
        const label = (aikbHits[i].path || '').split('/').pop() || `hit-${i + 1}`;
        nodes.push({ id: `a${i}`, label, x: 400 + Math.cos(angle) * radius, y: 150 + Math.sin(angle) * radius, kind: 'a' });
        edges.push({ s: 'q', t: `a${i}` });
        nodeCount += 1;
      }

      for (let i = 0; i < eventHits.length; i++) {
        const angle = (Math.PI * 2 * i) / Math.max(1, eventHits.length);
        const label = (eventHits[i].event_type || 'event').slice(0, 20);
        nodes.push({
          id: `e${i}`,
          label,
          x: 400 + Math.cos(angle) * (radius - 26),
          y: 150 + Math.sin(angle) * (radius - 26),
          kind: 'e'
        });
        edges.push({ s: 'q', t: `e${i}` });
        nodeCount += 1;
      }

      if (nodeCount === 0) {
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 * i) / 8;
          nodes.push({
            id: `f${i}`,
            label: `node-${i + 1}`,
            x: 400 + Math.cos(angle) * (radius - 12),
            y: 150 + Math.sin(angle) * (radius - 12),
            kind: 'f'
          });
          edges.push({ s: 'q', t: `f${i}` });
        }
      }

      edges.forEach((e) => {
        const s = nodes.find((n) => n.id === e.s);
        const t = nodes.find((n) => n.id === e.t);
        if (!s || !t) return;
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', s.x);
        line.setAttribute('y1', s.y);
        line.setAttribute('x2', t.x);
        line.setAttribute('y2', t.y);
        line.setAttribute('stroke', 'rgba(130, 175, 220, 0.35)');
        line.setAttribute('stroke-width', '1');
        el.memGraph.appendChild(line);
      });

      nodes.forEach((n) => {
        const g = document.createElementNS(ns, 'g');
        const c = document.createElementNS(ns, 'circle');
        c.setAttribute('cx', n.x);
        c.setAttribute('cy', n.y);
        c.setAttribute('r', n.kind === 'q' ? 16 : 9);
        c.setAttribute('fill',
          n.kind === 'q' ? '#53d8b5' :
          n.kind === 'a' ? '#57a6ff' :
          n.kind === 'e' ? '#ffba66' : '#7ec8ff'
        );
        g.appendChild(c);
        const t = document.createElementNS(ns, 'text');
        t.setAttribute('x', Number(n.x) + 12);
        t.setAttribute('y', Number(n.y) + 4);
        t.setAttribute('fill', '#dcecff');
        t.setAttribute('font-size', '11');
        t.textContent = n.label.slice(0, 42);
        g.appendChild(t);
        el.memGraph.appendChild(g);
      });
    };

    const escapeHtml = (value) => String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    const proposalGuidance = (p) => {
      const raw = String((p?.payload || {}).raw_text || '').toLowerCase();
      const summary = String(p?.summary || '').toLowerCase();
      const eventType = String(((p?.evidence || {}).event_type) || '').toLowerCase();
      const isSessionTask = p?.kind === 'task' && eventType === 'session_log_line';
      const looksOneOff = /(lets|let's|go ahead|what'?s next|update what we|continue work)/.test(raw || summary);
      const looksEnvelope = summary.includes('{"session_id"') || summary.includes('{"timestamp"') || raw.includes('<local-command-caveat>');

      const suggestedFile = (p?.payload || {}).suggested_file || 'memory-core only';
      const suggestedSection = (p?.payload || {}).suggested_section || '';
      const destination = suggestedSection ? `${suggestedFile} → ${suggestedSection}` : suggestedFile;

      let recommendation = 'Approve';
      const reasons = ['Durable memory candidate with clear context.'];
      if (looksEnvelope) {
        recommendation = 'Reject';
        reasons.splice(0, reasons.length, 'Structured envelope/tooling payload, not a durable memory.');
      } else if (isSessionTask && looksOneOff) {
        recommendation = 'Reject';
        reasons.splice(0, reasons.length, 'One-off session instruction; low long-term retrieval value.');
      } else if (isSessionTask) {
        reasons.splice(0, reasons.length, 'Task may be useful if it represents an ongoing multi-session objective.');
      }

      return { recommendation, reasons, destination };
    };

    const selectedProposal = () => state.memoryProposalsCache.find((p) => p.proposal_id === state.memorySelectedProposalId) || null;

    const renderProposalDetail = (proposalId) => {
      const p = state.memoryProposalsCache.find((item) => item.proposal_id === proposalId);
      if (!p) {
        el.memProposalDetail.innerHTML = '<div class="meta">Select a proposal to review.</div>';
        return;
      }
      const payloadPretty = escapeHtml(JSON.stringify(p.payload || {}, null, 2));
      const evidencePretty = escapeHtml(JSON.stringify(p.evidence || {}, null, 2));
      const guide = proposalGuidance(p);
      const chipClass = guide.recommendation === 'Approve' ? 'recommend-approve' : 'recommend-reject';
      el.memProposalDetail.innerHTML = `
        <div class="detail-title">Proposal Detail</div>
        <div class="meta">${escapeHtml(p.proposal_id)} · ${escapeHtml(p.status)} · ${fmtTs(p.created_ts)}</div>
        <div class="memory-helper">
          <div>
            <span class="memory-chip ${chipClass}">Recommend: ${guide.recommendation}</span>
            <span class="memory-chip">Destination: ${escapeHtml(guide.destination)}</span>
          </div>
          <div class="meta"><strong>If approved:</strong> stays in Memory Core for retrieval and future apply-to-AIKB workflows.</div>
          <div class="meta"><strong>If rejected:</strong> removed from active triage queue to reduce noise.</div>
          <div class="meta">${escapeHtml(guide.reasons.join(' '))}</div>
        </div>
        <label class="meta" for="mem-proposal-summary">Summary</label>
        <textarea id="mem-proposal-summary" class="memory-textarea">${escapeHtml(p.summary || '')}</textarea>
        <label class="meta" for="mem-proposal-payload">Payload JSON</label>
        <textarea id="mem-proposal-payload" class="memory-textarea">${payloadPretty}</textarea>
        <label class="meta" for="mem-proposal-notes">Review Notes</label>
        <textarea id="mem-proposal-notes" class="memory-textarea" placeholder="Optional review notes">${escapeHtml(p.review_notes || '')}</textarea>
        <details>
          <summary class="meta">Evidence</summary>
          <pre class="memory-textarea" style="min-height: 120px;">${evidencePretty}</pre>
        </details>
        <div class="memory-actions">
          <button id="mem-proposal-save-btn" class="memory-btn">Save Edit</button>
          <button id="mem-proposal-accept-btn" class="memory-btn">Approve (Keep)</button>
          <button id="mem-proposal-reject-btn" class="memory-btn">Reject (Noise)</button>
        </div>
      `;
      document.getElementById('mem-proposal-save-btn').addEventListener('click', () => {
        updateSelectedProposalContent().catch((err) => { el.memStatus.textContent = `Save failed: ${err.message}`; });
      });
      document.getElementById('mem-proposal-accept-btn').addEventListener('click', () => {
        setSelectedProposalStatus('approved').catch((err) => { el.memStatus.textContent = `Accept failed: ${err.message}`; });
      });
      document.getElementById('mem-proposal-reject-btn').addEventListener('click', () => {
        setSelectedProposalStatus('rejected').catch((err) => { el.memStatus.textContent = `Reject failed: ${err.message}`; });
      });
    };

    const renderMemoryProposals = (rows) => {
      state.memoryProposalsCache = (rows || []).slice(0, 80);
      if (!state.memoryProposalsCache.length) {
        el.memProposals.innerHTML = '<div class="memory-item">No proposals.</div>';
        el.memProposalDetail.innerHTML = '<div class="meta">No proposal selected.</div>';
        state.memorySelectedProposalId = null;
        return;
      }
      if (!state.memorySelectedProposalId || !state.memoryProposalsCache.some((p) => p.proposal_id === state.memorySelectedProposalId)) {
        state.memorySelectedProposalId = state.memoryProposalsCache[0].proposal_id;
      }
      el.memProposals.innerHTML = state.memoryProposalsCache.map((p) => {
        const title = escapeHtml((p.summary || '').replace(/^[^:]+:\s*/, '').slice(0, 86) || 'Untitled proposal');
        const summary = escapeHtml(p.summary || '');
        const activeClass = p.proposal_id === state.memorySelectedProposalId ? 'active' : '';
        const guide = proposalGuidance(p);
        const chipClass = guide.recommendation === 'Approve' ? 'recommend-approve' : 'recommend-reject';
        return `
          <div class="memory-item proposal-pill ${activeClass}" data-proposal-id="${p.proposal_id}">
            <div class="meta">${escapeHtml(p.kind)} · ${Number(p.confidence || 0).toFixed(2)} · ${fmtTs(p.created_ts)}</div>
            <div><strong>${title}</strong></div>
            <div><span class="memory-chip ${chipClass}">${guide.recommendation}</span></div>
            <div class="meta">${summary.slice(0, 180)}</div>
          </div>
        `;
      }).join('');
      el.memProposals.querySelectorAll('.proposal-pill').forEach((node) => {
        node.addEventListener('click', () => {
          state.memorySelectedProposalId = node.dataset.proposalId || null;
          renderMemoryProposals(state.memoryProposalsCache);
          renderProposalDetail(state.memorySelectedProposalId);
        });
      });
      renderProposalDetail(state.memorySelectedProposalId);
    };

    const updateSelectedProposalContent = async () => {
      const p = selectedProposal();
      if (!p) return;
      const summary = (document.getElementById('mem-proposal-summary')?.value || '').trim();
      if (!summary) throw new Error('Summary cannot be empty.');
      let payload = {};
      try {
        payload = JSON.parse(document.getElementById('mem-proposal-payload')?.value || '{}');
      } catch {
        throw new Error('Payload JSON is invalid.');
      }
      const out = await memoryApi(`/memory/proposals/${encodeURIComponent(p.proposal_id)}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ summary, payload }),
      });
      const idx = state.memoryProposalsCache.findIndex((item) => item.proposal_id === p.proposal_id);
      if (idx >= 0) state.memoryProposalsCache[idx] = out.proposal;
      renderMemoryProposals(state.memoryProposalsCache);
      el.memStatus.textContent = `Saved edits for ${p.proposal_id.slice(0, 8)}.`;
    };

    const setSelectedProposalStatus = async (status) => {
      const p = selectedProposal();
      if (!p) return;
      const reviewNotes = (document.getElementById('mem-proposal-notes')?.value || '').trim() || null;
      await memoryApi(`/memory/proposals/${encodeURIComponent(p.proposal_id)}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ status, review_notes: reviewNotes }),
      });
      el.memStatus.textContent = `${status} ${p.proposal_id.slice(0, 8)}.`;
      await refreshMemory();
    };

    const renderMemorySearch = (data) => {
      const rows = [];
      (data.events || []).slice(0, 10).forEach((e) => rows.push(`
        <div class="memory-item">
          <div class="meta">event · ${e.source || 'unknown'} · ${e.event_type || 'event'}</div>
          <div>${(e.snippet || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        </div>
      `));
      (data.aikb || []).slice(0, 10).forEach((h) => rows.push(`
        <div class="memory-item">
          <div class="meta">aikb · ${((h.path || '').split('/').pop() || 'file')}:${h.line || '-'}</div>
          <div>${(h.snippet || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        </div>
      `));
      el.memSearchResults.innerHTML = rows.join('') || '<div class="memory-item">No results.</div>';
      renderMemoryGraph(data);
    };

    const refreshMemory = async () => {
      el.memStatus.textContent = 'Refreshing memory...';
      const selectedStatus = el.memProposalStatus.value || '';
      const [health, stats, proposals] = await Promise.all([
        memoryApi('/memory/health'),
        memoryApi('/memory/stats'),
        memoryApi(`/memory/proposals?status=${encodeURIComponent(selectedStatus)}&limit=80`),
      ]);
      el.memHealth.textContent = health.status || 'unknown';
      el.memEvents.textContent = String(stats.events_total ?? '-');
      el.memProposalsNew.textContent = String(stats.proposals_new ?? '-');
      el.memMachines.textContent = String(stats.observer_machines ?? '-');
      renderMemoryProposals(proposals.proposals || []);
      renderMemoryGraph({
        query: state.memoryLastSearch?.query || 'memory',
        aikb: state.memoryLastSearch?.aikb || [],
        events: state.memoryLastSearch?.events || [],
      });
      el.memStatus.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      state.memoryLoaded = true;
    };

    const runMemorySearch = async () => {
      const q = el.memQuery.value.trim();
      if (!q) { el.memStatus.textContent = 'Enter a memory search query.'; return; }
      el.memStatus.textContent = `Searching "${q}"...`;
      const out = await memoryApi(`/memory/search?q=${encodeURIComponent(q)}&limit=20`);
      state.memoryLastSearch = out;
      renderMemorySearch(out);
      el.memStatus.textContent = `Search complete: ${out.counts?.events || 0} events, ${out.counts?.aikb || 0} AIKB hits.`;
    };

    const runHarvest = async () => {
      const maxEvents = Math.max(1, Math.min(2000, Number(el.memMaxEvents.value || 250)));
      const stateName = (el.memStateName.value || 'default').trim() || 'default';
      el.memStatus.textContent = `Harvesting (${maxEvents}, ${stateName})...`;
      const out = await memoryApi('/memory/harvest', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ max_events: maxEvents, state_name: stateName }),
      });
      el.memStatus.textContent = `Harvest done. scanned=${out.scanned || 0}, created=${out.created || 0}`;
      await refreshMemory();
    };

    el.facetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        state.facet = btn.dataset.facet;
        el.facetBtns.forEach(b => b.classList.toggle('active', b === btn));
        el.views.forEach(v => v.classList.toggle('active', v.id === `${state.facet}-view`));
        if (state.facet === 'shell') setTimeout(() => { if (state.fit) state.fit.fit(); state.term?.focus(); }, 50);
        if (state.facet === 'assist' && state.activeSession) loadHistory(state.activeSession.session_id);
        if (state.facet === 'memory' && !state.memoryLoaded) {
          refreshMemory().catch((err) => { el.memStatus.textContent = `Memory load failed: ${err.message}`; });
        }
      });
    });

    el.sendBtn.addEventListener('click', () => {
      const cmd = el.cmdInput.value.trim();
      if (!cmd || !state.socket) return;
      state.socket.send(cmd + "\n");
      el.cmdInput.value = '';
      setTimeout(() => { if (state.activeSession) loadHistory(state.activeSession.session_id); }, 500);
    });

    el.cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') el.sendBtn.click(); });
    el.menuBtn.addEventListener('click', () => el.sidebar.classList.toggle('open'));

    el.addWsBtn.addEventListener('click', () => openModal('ws-modal'));
    document.getElementById('ws-create-btn').addEventListener('click', async () => {
      const name = document.getElementById('ws-name').value;
      const path = document.getElementById('ws-path').value;
      if (!name || !path) return;
      try {
        const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        const ws = await api('/workspaces', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, slug, root_dir: path })
        });
        closeModal('ws-modal');
        await loadWorkspaces();
        selectWorkspace(ws);
      } catch (err) {
        alert('Workspace error: ' + err.message);
      }
    });

    el.addSessionBtn.addEventListener('click', () => openModal('session-modal'));
    el.memRefreshBtn.addEventListener('click', () => {
      refreshMemory().catch((err) => { el.memStatus.textContent = `Refresh failed: ${err.message}`; });
    });
    el.memProposalsRefreshBtn.addEventListener('click', () => {
      refreshMemory().catch((err) => { el.memStatus.textContent = `Proposal reload failed: ${err.message}`; });
    });
    el.memProposalStatus.addEventListener('change', () => {
      refreshMemory().catch((err) => { el.memStatus.textContent = `Proposal filter failed: ${err.message}`; });
    });
    el.memSearchBtn.addEventListener('click', () => {
      runMemorySearch().catch((err) => { el.memStatus.textContent = `Search failed: ${err.message}`; });
    });
    el.memQuery.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runMemorySearch().catch((err) => { el.memStatus.textContent = `Search failed: ${err.message}`; });
      }
    });
    el.memHarvestBtn.addEventListener('click', () => {
      runHarvest().catch((err) => { el.memStatus.textContent = `Harvest failed: ${err.message}`; });
    });
    el.sessionCreateBtn.addEventListener('click', async () => {
      const provider = document.getElementById('session-provider').value;
      const customTitle = document.getElementById('session-title').value;
      if (!state.activeWorkspace) return;
      
      el.sessionCreateBtn.disabled = true;
      el.sessionCreateBtn.textContent = 'Launching...';
      
      try {
        const s = await api('/sessions/v2', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ workspace_id: state.activeWorkspace.workspace_id, provider, title: customTitle || provider })
        });
        closeModal('session-modal');
        state.sessions.push(s);
        renderSessions();
        selectSession(s);
      } catch (err) {
        alert('Launch failed: ' + err.message);
      } finally {
        el.sessionCreateBtn.disabled = false;
        el.sessionCreateBtn.textContent = 'Launch Tool';
      }
    });

    document.addEventListener('click', (event) => {
      if (!isMobileViewport()) return;
      if (!el.sidebar.classList.contains('open')) return;
      if (el.sidebar.contains(event.target) || el.menuBtn.contains(event.target)) return;
      el.sidebar.classList.remove('open');
    });

    window.addEventListener('resize', () => {
      if (state.fit) state.fit.fit();
      if (!isMobileViewport()) {
        el.sidebar.classList.remove('open');
      }
    });
    loadWorkspaces();
  </script>
</body>
</html>
