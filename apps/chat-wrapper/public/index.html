<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Turing Desktop v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
  <style>
    :root {
      --bg-0: #071221;
      --bg-1: #0f1f34;
      --surface: rgba(10, 18, 30, 0.85);
      --surface-2: rgba(16, 28, 43, 0.95);
      --border: rgba(130, 175, 220, 0.2);
      --accent: #53d8b5;
      --accent-2: #57a6ff;
      --text: #eef5ff;
      --text-dim: #9cb0c8;
      --radius: 12px;
      --header-h: 60px;
      --sidebar-w: 260px;
      --cmd-h: 70px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Sora', sans-serif; background: var(--bg-0); color: var(--text); overflow: hidden; }

    #app { display: flex; height: 100dvh; }

    aside#sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100;
    }
    .sidebar-header { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .workspace-list { flex: 1; overflow-y: auto; padding: 10px; }
    .ws-item { 
      padding: 10px 12px; border-radius: var(--radius); cursor: pointer; margin-bottom: 4px;
      transition: background 0.2s; border: 1px solid transparent; overflow: hidden;
    }
    .ws-item:hover { background: rgba(255,255,255,0.05); }
    .ws-item.active { background: rgba(87, 166, 255, 0.15); border-color: var(--accent-2); }
    .ws-item .name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .ws-item .path { font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

    main#content { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }

    header#main-header {
      height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 15px; gap: 10px; flex-shrink: 0;
    }

    .facet-tabs { display: flex; background: rgba(0,0,0,0.2); padding: 3px; border-radius: 10px; flex-shrink: 0; }
    .facet-btn { 
      padding: 6px 12px; border-radius: 8px; border: 0; background: transparent; 
      color: var(--text-dim); font-weight: 600; font-size: 0.8rem; cursor: pointer;
    }
    .facet-btn.active { background: var(--accent-2); color: #000; }

    .session-tabs { display: flex; gap: 6px; overflow-x: auto; flex: 1; padding: 0 5px; scrollbar-width: none; }
    .session-tabs::-webkit-scrollbar { display: none; }
    .session-tab {
      padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.05);
      font-size: 0.75rem; white-space: nowrap; cursor: pointer; border: 1px solid var(--border);
      max-width: 150px; text-overflow: ellipsis; overflow: hidden;
    }
    .session-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(83, 216, 181, 0.1); }

    #facet-container { flex: 1; position: relative; overflow: hidden; }
    .facet-view { position: absolute; inset: 0; display: none; flex-direction: column; }
    .facet-view.active { display: flex; }

    #shell-view { background: #000; padding: 5px; }
    .terminal-container { flex: 1; width: 100%; height: 100%; }

    #assist-view { background: var(--bg-1); overflow-y: auto; padding: 15px; gap: 12px; scroll-behavior: smooth; }
    .msg { max-width: 90%; padding: 10px 14px; border-radius: var(--radius); line-height: 1.4; font-size: 0.9rem; margin-bottom: 10px; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: var(--accent-2); color: #000; border-bottom-right-radius: 2px; }
    .msg.assistant { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
    .msg pre { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; overflow-x: auto; margin: 8px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .msg code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }

    #edit-view iframe { width: 100%; height: 100%; border: 0; }

    #command-bar {
      height: var(--cmd-h); background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 15px; gap: 15px; flex-shrink: 0;
    }
    #cmd-input {
      flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 15px; color: var(--text); font-family: inherit; font-size: 0.95rem; min-width: 100px; box-sizing: border-box;
    }
    .cmd-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 0; background: var(--surface-2);
      color: var(--text); cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
    }
    .cmd-btn.active { color: var(--accent); box-shadow: 0 0 10px var(--accent); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; place-items: center; z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: grid; }
    .modal {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px;
      width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; gap: 15px;
    }
    .modal h2 { font-size: 1.2rem; font-weight: 700; }
    .modal input, .modal select {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
      background: #0a121e; color: #fff; font-family: inherit; font-size: 0.95rem; outline: none; appearance: none;
    }
    .modal select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; }
    .modal option { background: #0a121e; color: #fff; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .btn { padding: 8px 16px; border-radius: 8px; border: 0; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .btn-primary { background: var(--accent-2); color: #000; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-dim); }

    @media (max-width: 768px) {
      aside#sidebar { position: absolute; transform: translateX(-100%); width: 85%; max-width: 300px; }
      aside#sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
      .sidebar-toggle { display: flex !important; }
      .session-tabs { display: none; }
    }
    .sidebar-toggle { display: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span>Workspaces</span>
        <button id="add-ws-btn" title="New Workspace" style="background: transparent; border: 0; color: var(--accent); font-size: 1.5rem; cursor: pointer;">+</button>
      </div>
      <div id="workspace-list" class="workspace-list"></div>
    </aside>

    <main id="content">
      <header id="main-header">
        <button id="menu-btn" class="cmd-btn sidebar-toggle">☰</button>
        <div class="facet-tabs">
          <button class="facet-btn active" data-facet="assist">Assist</button>
          <button class="facet-btn" data-facet="shell">Shell</button>
          <button class="facet-btn" data-facet="edit">Edit</button>
        </div>
        <div id="session-tabs" class="session-tabs"></div>
        <button id="add-session-btn" class="facet-btn" title="New Session">+</button>
      </header>

      <div id="facet-container">
        <div id="assist-view" class="facet-view active">
          <div id="chat-history" style="display: flex; flex-direction: column;"></div>
        </div>
        <div id="shell-view" class="facet-view">
          <div id="terminal" class="terminal-container"></div>
        </div>
        <div id="edit-view" class="facet-view">
          <iframe id="editor-frame" src=""></iframe>
        </div>
      </div>

      <footer id="command-bar">
        <button id="mic-btn" class="cmd-btn">\ud83c\udf99\ufe0f</button>
        <input type="text" id="cmd-input" placeholder="Ask or type command..." autocomplete="off">
        <button id="send-btn" class="cmd-btn">➤</button>
      </footer>
    </main>
  </div>

  <div id="ws-modal" class="modal-overlay">
    <div class="modal">
      <h2>New Workspace</h2>
      <input type="text" id="ws-name" placeholder="Project Name (e.g. My App)">
      <input type="text" id="ws-path" placeholder="Root Path (e.g. /home/mcglothi/Code/my-app)">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('ws-modal')">Cancel</button>
        <button class="btn btn-primary" id="ws-create-btn">Create Workspace</button>
      </div>
    </div>
  </div>

  <div id="session-modal" class="modal-overlay">
    <div class="modal">
      <h2>New Session</h2>
      <label style="font-size: 0.8rem; color: var(--text-dim);">Select Tool</label>
      <select id="session-provider">
        <option value="claude">Claude Code</option>
        <option value="gemini">Gemini Code Assist</option>
        <option value="codex">Codex CLI</option>
        <option value="zsh">Zsh Shell</option>
      </select>
      <input type="text" id="session-title" placeholder="Session Title (optional)">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('session-modal')">Cancel</button>
        <button class="btn btn-primary" id="session-create-btn">Launch Tool</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script>
    const state = {
      workspaces: [],
      activeWorkspace: null,
      sessions: [],
      activeSession: null,
      facet: 'assist',
      term: null,
      fit: null,
      socket: null
    };

    const api = async (path, opts = {}) => {
      console.log('API Call:', path, opts.method || 'GET');
      try {
        const res = await fetch("/api/v2" + path, opts);
        if (!res.ok) {
          const body = await res.text();
          console.error('API Error:', res.status, body);
          throw new Error(`API ${res.status}: ${body}`);
        }
        return res.json();
      } catch (err) {
        console.error('Fetch Failed:', err);
        throw err;
      }
    };

    const el = {
      wsList: document.getElementById('workspace-list'),
      sessionTabs: document.getElementById('session-tabs'),
      chatHistory: document.getElementById('chat-history'),
      terminal: document.getElementById('terminal'),
      editorFrame: document.getElementById('editor-frame'),
      cmdInput: document.getElementById('cmd-input'),
      micBtn: document.getElementById('mic-btn'),
      sendBtn: document.getElementById('send-btn'),
      facetBtns: document.querySelectorAll('.facet-btn'),
      views: document.querySelectorAll('.facet-view'),
      sidebar: document.getElementById('sidebar'),
      menuBtn: document.getElementById('menu-btn'),
      addWsBtn: document.getElementById('add-ws-btn'),
      addSessionBtn: document.getElementById('add-session-btn'),
      sessionCreateBtn: document.getElementById('session-create-btn')
    };

    const closeModal = (id) => document.getElementById(id).classList.remove('active');
    const openModal = (id) => document.getElementById(id).classList.add('active');

    const initTerm = () => {
      if (state.term) return;
      state.term = new Terminal({
        fontFamily: 'JetBrains Mono, monospace',
        fontSize: 13,
        theme: { background: '#000' },
        cursorBlink: true
      });
      state.fit = new FitAddon.FitAddon();
      state.term.loadAddon(state.fit);
      state.term.open(el.terminal);
      state.term.onData(data => { if (state.socket?.readyState === WebSocket.OPEN) state.socket.send(data); });
    };

    const connectWS = (sessionId) => {
      console.log('Connecting WebSocket for session:', sessionId);
      if (state.socket) state.socket.close();
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      state.socket = new WebSocket(`${protocol}://${location.host}/ws/v2/terminal/${sessionId}`);
      
      state.socket.onopen = () => {
        console.log('WebSocket Connected');
        const dims = state.fit.proposeDimensions();
        state.socket.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
      };
      
      state.socket.onmessage = (ev) => {
        state.term.write(ev.data);
      };
      
      state.socket.onerror = (err) => console.error('WebSocket Error:', err);
      state.socket.onclose = () => console.log('WebSocket Closed');
    };

    const loadWorkspaces = async () => {
      state.workspaces = await api('/workspaces');
      renderWorkspaces();
      if (state.workspaces.length && !state.activeWorkspace) selectWorkspace(state.workspaces[0]);
    };

    const renderWorkspaces = () => {
      el.wsList.innerHTML = state.workspaces.map(ws => `
        <div class="ws-item ${state.activeWorkspace?.workspace_id === ws.workspace_id ? 'active' : ''}" onclick="selectWorkspaceById('${ws.workspace_id}')">
          <div class="name">${ws.name}</div>
          <div class="path">${ws.root_dir.replace("/home/mcglothi/Code", "~")}</div>
        </div>
      `).join('');
    };

    window.selectWorkspaceById = (id) => selectWorkspace(state.workspaces.find(w => w.workspace_id === id));

    const selectWorkspace = async (ws) => {
      console.log('Selecting Workspace:', ws.name);
      state.activeWorkspace = ws;
      renderWorkspaces();
      try {
        state.sessions = await api(`/sessions/v2?workspace_id=${ws.workspace_id}`);
        renderSessions();
        if (state.sessions.length) selectSession(state.sessions[0]);
        else createInitialSessions(ws);
      } catch (err) {
        console.error('Failed to load sessions:', err);
      }
      el.editorFrame.src = "https://code.home.timmcg.net/?folder=" + encodeURIComponent(ws.root_dir.replace("/home/mcglothi/Code", "/home/coder/project"));
      el.sidebar.classList.remove('open');
    };

    const createInitialSessions = async (ws) => {
      console.log('Creating initial sessions...');
      try {
        const shell = await api('/sessions/v2', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ workspace_id: ws.workspace_id, provider: 'zsh', title: 'Shell' })
        });
        const claude = await api('/sessions/v2', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ workspace_id: ws.workspace_id, provider: 'claude', title: 'Claude' })
        });
        state.sessions = [shell, claude];
        renderSessions();
        selectSession(shell);
      } catch (err) {
        console.error('Failed to create initial sessions:', err);
      }
    };

    const renderSessions = () => {
      el.sessionTabs.innerHTML = state.sessions.map(s => `
        <div class="session-tab ${state.activeSession?.session_id === s.session_id ? 'active' : ''}" onclick="selectSessionById('${s.session_id}')">
          ${s.title}
        </div>
      `).join('');
    };

    window.selectSessionById = (id) => selectSession(state.sessions.find(s => s.session_id === id));

    const selectSession = (s) => {
      console.log('Selecting Session:', s.title);
      state.activeSession = s;
      renderSessions();
      initTerm();
      connectWS(s.session_id);
      loadHistory(s.session_id);
      el.cmdInput.placeholder = `Message ${s.provider}...`;
    };

    const loadHistory = async (id) => {
      try {
        const data = await api(`/history/${id}`);
        el.chatHistory.innerHTML = data.events.slice(-40).map(ev => {
          if (ev.event === 'input') return `<div class="msg user">${ev.data}</div>`;
          if (ev.event === 'output') {
             const clean = ev.data.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '');
             if (!clean.trim()) return '';
             return `<div class="msg assistant">${marked.parse(clean)}</div>`;
          }
          return '';
        }).join('');
        el.chatHistory.scrollTop = el.chatHistory.scrollHeight;
      } catch (err) {
        console.warn('History load failed:', err);
      }
    };

    el.facetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        state.facet = btn.dataset.facet;
        el.facetBtns.forEach(b => b.classList.toggle('active', b === btn));
        el.views.forEach(v => v.classList.toggle('active', v.id === `${state.facet}-view`));
        if (state.facet === 'shell') setTimeout(() => { if (state.fit) state.fit.fit(); state.term?.focus(); }, 50);
        if (state.facet === 'assist' && state.activeSession) loadHistory(state.activeSession.session_id);
      });
    });

    el.sendBtn.addEventListener('click', () => {
      const cmd = el.cmdInput.value.trim();
      if (!cmd || !state.socket) return;
      state.socket.send(cmd + "\n");
      el.cmdInput.value = '';
      setTimeout(() => { if (state.activeSession) loadHistory(state.activeSession.session_id); }, 500);
    });

    el.cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') el.sendBtn.click(); });
    el.menuBtn.addEventListener('click', () => el.sidebar.classList.toggle('open'));

    el.addWsBtn.addEventListener('click', () => openModal('ws-modal'));
    document.getElementById('ws-create-btn').addEventListener('click', async () => {
      const name = document.getElementById('ws-name').value;
      const path = document.getElementById('ws-path').value;
      if (!name || !path) return;
      try {
        const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        const ws = await api('/workspaces', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, slug, root_dir: path })
        });
        closeModal('ws-modal');
        await loadWorkspaces();
        selectWorkspace(ws);
      } catch (err) {
        alert('Workspace error: ' + err.message);
      }
    });

    el.addSessionBtn.addEventListener('click', () => openModal('session-modal'));
    el.sessionCreateBtn.addEventListener('click', async () => {
      const provider = document.getElementById('session-provider').value;
      const customTitle = document.getElementById('session-title').value;
      if (!state.activeWorkspace) return;
      
      el.sessionCreateBtn.disabled = true;
      el.sessionCreateBtn.textContent = 'Launching...';
      
      try {
        const s = await api('/sessions/v2', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ workspace_id: state.activeWorkspace.workspace_id, provider, title: customTitle || provider })
        });
        closeModal('session-modal');
        state.sessions.push(s);
        renderSessions();
        selectSession(s);
      } catch (err) {
        alert('Launch failed: ' + err.message);
      } finally {
        el.sessionCreateBtn.disabled = false;
        el.sessionCreateBtn.textContent = 'Launch Tool';
      }
    });

    window.addEventListener('resize', () => { if (state.fit) state.fit.fit(); });
    loadWorkspaces();
  </script>
</body>
</html>
