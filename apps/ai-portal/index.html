<!DOCTYPE html>
<html lang="en" data-theme="void-violet">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LAB Portal</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            /* Common Base16 Zinc Palette */
            --base00: #09090b;
            --base01: #18181b;
            --base02: #27272a;
            --base03: #52525b;
            --base04: #a1a1aa;
            --base05: #fafafa;
            --base06: #f4f4f5;
            --base07: #ffffff;
            --base08: #f43f5e;
            --base09: #f59e0b;
            --base0A: #eab308;
            --base0B: #22c55e;
            --base0C: #06b6d4;
        }

        [data-theme="void-violet"] {
            --base0D: #7c3aed;
            --base0E: #a78bfa;
            --base0F: #c4b5fd;
        }

        [data-theme="ember"] {
            --base0D: #d97706;
            --base0E: #f59e0b;
            --base0F: #fbbf24;
        }

        [data-theme="arctic"] {
            --base0D: #0891b2;
            --base0E: #06b6d4;
            --base0F: #67e8f9;
        }

        [data-theme="sakura"] {
            --base0D: #be185d;
            --base0E: #f43f5e;
            --base0F: #fb7185;
        }

        [data-theme="carbon"] {
            --base0D: #4d7c0f;
            --base0E: #84cc16;
            --base0F: #bef264;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--base00);
            color: var(--base05);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* SVG Noise Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: var(--base01);
            border-bottom: 1px solid var(--base02);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .brand {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            color: var(--base07);
        }

        .topology {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pill {
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--base02);
            color: var(--base04);
            border: 1px solid var(--base03);
        }

        .pill.active {
            background-color: var(--base0D);
            color: var(--base07);
            border-color: var(--base0D);
        }

        .theme-switcher {
            display: flex;
            gap: 12px;
        }

        .theme-swatch {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .theme-swatch:hover {
            transform: scale(1.2);
        }

        .theme-swatch.active {
            border-color: var(--base07);
        }

        .swatch-void-violet { background-color: #7c3aed; }
        .swatch-ember { background-color: #d97706; }
        .swatch-arctic { background-color: #0891b2; }
        .swatch-sakura { background-color: #be185d; }
        .swatch-carbon { background-color: #4d7c0f; }

        .status-bar {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            height: 32px;
            background-color: var(--base00);
            border-bottom: 1px solid var(--base02);
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 0.75rem;
            color: var(--base04);
            gap: 24px;
            z-index: 99;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-label {
            color: var(--base03);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-value {
            color: var(--base06);
        }

        .status-value.muted {
            color: var(--base03);
        }

        main {
            margin-top: 112px;
            padding: 32px 24px;
            flex-grow: 1;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .category-section {
            margin-bottom: 48px;
        }

        .category-heading {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--base03);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--base02);
            padding-bottom: 8px;
        }

        .grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(4, 1fr);
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .topology { display: none; }
        }

        .card {
            background-color: var(--base01);
            border: 1px solid var(--base02);
            border-radius: 8px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s, border-top-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            border-top: 2px solid var(--base0D);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-icon {
            color: var(--base0D);
            width: 24px;
            height: 24px;
        }

        .health-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--base03);
        }

        .health-dot.online {
            background-color: var(--base0B);
            box-shadow: 0 0 8px var(--base0B);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .card-body h3 {
            font-size: 1.25rem;
            color: var(--base07);
            margin-bottom: 4px;
        }

        .card-body p {
            font-size: 0.875rem;
            color: var(--base04);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }

        .node-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--base03);
            background-color: var(--base02);
            padding: 2px 6px;
            border-radius: 4px;
        }

        footer {
            padding: 32px 24px;
            background-color: var(--base01);
            border-top: 1px solid var(--base02);
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        footer .pill {
            opacity: 0.5;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .loader {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--base0D);
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">AI LAB</div>
        <div class="topology">
            <span class="pill">hopper</span>
            <span class="pill">turing</span>
            <span class="pill active">you</span>
        </div>
        <div class="theme-switcher">
            <div class="theme-swatch swatch-void-violet" data-theme="void-violet" title="Void Violet"></div>
            <div class="theme-swatch swatch-ember" data-theme="ember" title="Ember"></div>
            <div class="theme-swatch swatch-arctic" data-theme="arctic" title="Arctic"></div>
            <div class="theme-swatch swatch-sakura" data-theme="sakura" title="Sakura"></div>
            <div class="theme-swatch swatch-carbon" data-theme="carbon" title="Carbon"></div>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-item">
            <span class="status-label">Model:</span>
            <span id="model-status" class="status-value">Loading...</span>
        </div>
        <div class="status-item">
            <span class="status-label">Memory:</span>
            <span id="memory-status" class="status-value">Loading...</span>
        </div>
    </div>

    <main id="main-content">
        <div id="loading">
            <div class="loader"></div>
            <span style="font-size: 0.75rem; color: var(--base03); text-transform: uppercase; letter-spacing: 0.1em;">Initializing Lab Portal</span>
        </div>
    </main>

    <footer id="footer-nodes">
        <!-- Node pills will be injected here -->
    </footer>

    <script>
        const themes = ['void-violet', 'ember', 'arctic', 'sakura', 'carbon'];
        const modelEndpoint = 'http://hopper.home.timmcg.net:8012/v1/models';
        const metricsEndpoint = 'http://hopper.home.timmcg.net:9100/metrics';

        // Theme management
        function setTheme(theme) {
            if (!themes.includes(theme)) theme = 'void-violet';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('ai-portal-theme', theme);
            
            document.querySelectorAll('.theme-swatch').forEach(swatch => {
                swatch.classList.toggle('active', swatch.dataset.theme === theme);
            });
        }

        document.querySelectorAll('.theme-swatch').forEach(swatch => {
            swatch.addEventListener('click', () => setTheme(swatch.dataset.theme));
        });

        const savedTheme = localStorage.getItem('ai-portal-theme') || 'void-violet';
        setTheme(savedTheme);

        // Status Polling
        async function pollStatus() {
            try {
                const modelRes = await fetch(modelEndpoint);
                if (modelRes.ok) {
                    const data = await modelRes.json();
                    if (data.data && data.data.length > 0) {
                        const activeModel = data.data[0];
                        document.getElementById('model-status').textContent = `${activeModel.id}`;
                        document.getElementById('model-status').classList.remove('muted');
                    } else {
                        document.getElementById('model-status').textContent = 'no model loaded';
                        document.getElementById('model-status').classList.add('muted');
                    }
                } else {
                    throw new Error();
                }
            } catch (e) {
                document.getElementById('model-status').textContent = 'hopper unreachable';
                document.getElementById('model-status').classList.add('muted');
            }

            try {
                const metricsRes = await fetch(metricsEndpoint);
                if (metricsRes.ok) {
                    const text = await metricsRes.text();
                    const match = text.match(/node_memory_MemAvailable_bytes\s+(\d+)/);
                    if (match) {
                        const bytes = parseInt(match[1]);
                        const gb = (bytes / (1024 * 1024 * 1024)).toFixed(1);
                        document.getElementById('memory-status').textContent = `${gb} GB free`;
                        document.getElementById('memory-status').classList.remove('muted');
                    }
                }
            } catch (e) {
                document.getElementById('memory-status').textContent = '—';
                document.getElementById('memory-status').classList.add('muted');
            }
        }

        setInterval(pollStatus, 30000);
        pollStatus();

        // Service Loading
        async function loadServices() {
            try {
                const res = await fetch('services.json');
                const services = await res.json();
                renderServices(services);
            } catch (e) {
                console.error('Failed to load services:', e);
                document.getElementById('main-content').innerHTML = '<div style="text-align: center; color: var(--base08);">Failed to load lab services.</div>';
            }
        }

        function renderServices(services) {
            const main = document.getElementById('main-content');
            main.innerHTML = '';

            const categories = [...new Set(services.map(s => s.category))];
            const nodes = [...new Set(services.map(s => s.node))];

            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                
                const h2 = document.createElement('h2');
                h2.className = 'category-heading';
                h2.textContent = cat;
                section.appendChild(h2);

                const grid = document.createElement('div');
                grid.className = 'grid';

                services.filter(s => s.category === cat).forEach(service => {
                    const card = document.createElement('a');
                    card.href = service.url;
                    card.className = 'card';
                    card.target = '_blank';
                    card.innerHTML = `
                        <div class="card-header">
                            <i data-feather="${service.icon}" class="card-icon"></i>
                            <div class="health-dot" id="health-${service.id}"></div>
                        </div>
                        <div class="card-body">
                            <h3>${service.name}</h3>
                            <p>${service.desc}</p>
                        </div>
                        <div class="card-footer">
                            <span class="node-badge">${service.node}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                    checkHealth(service);
                });

                section.appendChild(grid);
                main.appendChild(section);
            });

            // Render footer nodes
            const footer = document.getElementById('footer-nodes');
            footer.innerHTML = nodes.map(node => `<span class="pill">${node}</span>`).join('');

            feather.replace();
        }

        async function checkHealth(service) {
            const dot = document.getElementById(`health-${service.id}`);
            try {
                const res = await fetch(service.health_url, { method: 'HEAD', mode: 'no-cors' });
                // Note: no-cors won't let us see the status, but if it doesn't throw, it's likely fine
                // or we can try a simple fetch if health_url allows CORS.
                // For a homelab with multiple domains, CORS is likely an issue.
                // We'll try a regular fetch first.
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                const fetchRes = await fetch(service.health_url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (fetchRes.ok) {
                    dot.classList.add('online');
                } else {
                    dot.classList.remove('online');
                }
            } catch (e) {
                dot.classList.remove('online');
            }
        }

        loadServices();
    </script>
</body>
</html>
