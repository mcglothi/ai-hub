server {
    listen 80;
    server_name ai.home.timmcg.net;

    root /opt/containers/ai-portal;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Enable CORS for health checks if needed
    # add_header 'Access-Control-Allow-Origin' '*';

    access_log /var/log/nginx/ai-portal.access.log;
    error_log /var/log/nginx/ai-portal.error.log;
}
